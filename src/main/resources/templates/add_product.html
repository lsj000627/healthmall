<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>상품 등록 | BURN IT UP</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<!-- ✅ 상단 바 (헤더 프래그먼트) -->
<div th:replace="~{fragments/header :: header}"></div>
    <div class="container">
        <h1 class="title-orange">상품 등록 폼</h1>

        <form th:action="@{/products/add}" th:object="${product}" method="post">
            <!-- 이름 -->
            <label for="name">이름:</label>
            <input type="text" id="name" th:field="*{name}" required>

            <!-- 가격 -->
            <label for="price">가격:</label>
            <input type="number" id="price" th:field="*{price}" required>

            <!-- 카테고리 선택 -->
            <label for="category">카테고리:</label>
            <select id="category" th:field="*{category}" required>
                <option value="">-- 카테고리 선택 --</option>
                <option value="의류">의류</option>
                <option value="보충제">보충제</option>
                <option value="용품">용품</option>
                <option value="기타">기타</option>
            </select>

            <!-- 이미지 선택 -->
            <label for="image">이미지 선택:</label>
            <select id="image" th:field="*{image}" required>
                <option value="">-- 이미지 선택 --</option>
                <option value="title.jpg">title.jpg</option>
                <option value="orange.jpg">orange.jpg</option>
                <option value="yellow.jpg">yellow.jpg</option>
                <option value="classic.jpg">classic.jpg</option>
                <option value="fit.jpg">fit.jpg</option>
                <option value="rugby.jpg">rugby.jpg</option>
                <option value="overfit.jpg">overfit.jpg</option>
                <option value="burn.jpg">burn.jpg</option>
                <option value="sinta.jpg">sinta.jpg</option>
                <option value="ns.jpg">ns.jpg</option>
                <option value="myprotien.jpg">myprotien.jpg</option> <!-- ✅ 추가 -->
            </select>

            <!-- 이미지 미리보기 -->
            <div>
                <img id="preview" src="" alt="미리보기" style="max-width: 100px; margin-top: 10px;">
            </div>

            <script>
                const select = document.getElementById('image');
                const preview = document.getElementById('preview');
                select.addEventListener('change', function () {
                    const filename = this.value;
                    preview.src = filename ? '/images/' + filename : '';
                });
            </script>

            <!-- 등록 버튼 -->
            <button type="submit" class="btn-orange">등록</button>
        </form>

        <div class="action-buttons">
            <a href="/products" class="btn-outline">목록으로</a>
        </div>
    </div>
</body>
</html>
