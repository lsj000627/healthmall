<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">BURNITUP</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        /* 🔸 밑줄 제거 (강제 적용) */
        .left-logo a {
            text-decoration: none !important;
            color: #ff3c00 !important;
            font-weight: bold;
        }
    </style>
</head>
<body>
<!-- 공통 상단바 -->
<header class="top-header">
    <div class="left-logo">
        <a href="http://223.130.162.28:30610/products">BURNITUP</a>
    </div>
	   <nav class="right-menu">
	    <a href="http://223.130.162.28:30610/products">SHOP</a>
	    <a href="/users">USERS</a>
	    <a href="/login" th:if="${session.loginUserId == null}">LOGIN</a>
	    <span th:unless="${session.loginUserId == null}" style="color: #ff3c00; font-weight: bold;">
	        👤 USER <span th:text="${session.loginUserId}"></span>
	    </span>
	    <a href="/logout" th:unless="${session.loginUserId == null}">LOGOUT</a>
	    <a href="/cart">CART(0)</a>
	
	    <!-- 🔍 검색 입력창 + 버튼 -->
	    <form action="/products/search" method="get"
	          style="display: inline-flex; align-items: center; margin-left: 20px;">
	        <input type="text" name="keyword" placeholder="제품명 검색"
	               style="padding: 6px 8px; border: none; border-radius: 4px; background-color: #222; color: white;">
	        <button type="submit"
	                style="margin-left: 6px; padding: 6px 12px; background: #ff3c00; color: white; border: none; border-radius: 4px; cursor: pointer;">
	            SEARCH
	        </button>
	    </form>
	</nav>

</header>
</body>
</html>
